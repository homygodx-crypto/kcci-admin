<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대시보드 — KCCI Master</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<style>
.stat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 24px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.stat-label { font-size: 11px; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 10px; }
.stat-num { font-size: 36px; font-weight: 700; line-height: 1; }
.stat-num.gold { color: var(--gold); }
.stat-num.green { color: var(--green); }
.stat-num.amber { color: var(--amber); }
.stat-num.red { color: var(--red); }
.search-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
.search-input { flex: 1; min-width: 200px; background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; font-size: 13px; font-family: inherit; border-radius: 4px; outline: none; }
.search-input:focus { border-color: var(--gold); }
.filter-btn { padding: 7px 14px; font-size: 12px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; font-family: inherit; transition: all .15s; }
.filter-btn.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 600; }
.filter-btn:hover:not(.active) { background: var(--bg3); }
.section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-head h2 { font-size: 15px; font-weight: 500; }
/* 모달 폼 */
.modal-wide .modal { width: 680px; }
.form-section { font-size: 11px; color: var(--gold); letter-spacing: .15em; text-transform: uppercase; margin: 16px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
@media(max-width:900px){ .stat-grid{grid-template-columns:1fr 1fr;} }
@media(max-width:600px){ .stat-grid{grid-template-columns:1fr 1fr;} }
</style>
</head>
<body>
<div class="layout">
  <!-- 사이드바 -->
  <aside class="sidebar">
    <div class="sb-logo">
      <span class="sb-logo-name">KCCI Master</span>
      <span class="sb-logo-sub">운영 관리 시스템</span>
    </div>
    <nav class="sb-nav">
      <div class="sb-sec">메인</div>
      <a href="dashboard.html" class="sb-item active"><span class="ic">📊</span><span>대시보드</span></a>
      <a href="reservations.html" class="sb-item"><span class="ic">📅</span><span>예약 관리</span></a>
      <div class="sb-sec">도구</div>
      <a href="sitegen.html" class="sb-item"><span class="ic">🚀</span><span>홈페이지 생성</span></a>
      <a href="settings.html" class="sb-item"><span class="ic">⚙️</span><span>설정</span></a>
    </nav>
    <div class="sb-footer">
      <div class="sb-logout" onclick="logout()">
        <span>🚪</span><span>로그아웃</span>
      </div>
    </div>
  </aside>

  <!-- 메인 -->
  <div class="main">
    <div class="topbar">
      <span class="topbar-title">대시보드</span>
      <div class="topbar-right">
        <button class="btn btn-primary" onclick="openAdd()">+ 업체 추가</button>
      </div>
    </div>

    <div class="content">
      <!-- 통계 카드 -->
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-label">전체 업체</div><div class="stat-num gold" id="statTotal">0</div></div>
        <div class="stat-card"><div class="stat-label">계약 중</div><div class="stat-num green" id="statActive">0</div></div>
        <div class="stat-card"><div class="stat-label">만료 임박</div><div class="stat-num amber" id="statExpiring">0</div></div>
        <div class="stat-card"><div class="stat-label">만료</div><div class="stat-num red" id="statExpired">0</div></div>
      </div>

      <!-- 업체 목록 -->
      <div class="card">
        <div class="card-head">
          <h3>업체 목록</h3>
          <div style="display:flex;gap:8px;align-items:center">
            <button class="btn btn-ghost" style="font-size:12px" onclick="exportData()">📤 백업</button>
            <label class="btn btn-ghost" style="font-size:12px;cursor:pointer">
              📥 복원<input type="file" accept=".json" onchange="importData(this)" style="display:none">
            </label>
          </div>
        </div>
        <div style="padding:14px 16px;border-bottom:1px solid var(--border)">
          <div class="search-bar">
            <input class="search-input" type="text" placeholder="업체명, 사장님, 전화번호 검색..." oninput="filterClients(this.value)">
            <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
            <button class="filter-btn" onclick="setFilter('active',this)">계약중</button>
            <button class="filter-btn" onclick="setFilter('expiring',this)">만료임박</button>
            <button class="filter-btn" onclick="setFilter('expired',this)">만료</button>
          </div>
        </div>
        <div style="overflow-x:auto">
          <table class="tbl">
            <thead>
              <tr>
                <th>업체명</th><th>사장님</th><th>전화</th><th>업종</th><th>상태</th><th>만료</th><th>관리</th>
              </tr>
            </thead>
            <tbody id="clientTbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 업체 추가/수정 모달 -->
<div class="modal-bg modal-wide" id="clientModal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">업체 추가</h3>
      <button class="modal-close" onclick="closeClientModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-section">기본 정보</div>
      <div class="fg-row">
        <div class="fg"><label>업체명 *</label><input type="text" id="fName" placeholder="예) 소예 필라테스"></div>
        <div class="fg"><label>사장님 / 대표자</label><input type="text" id="fOwner" placeholder="예) 박효미 원장"></div>
      </div>
      <div class="fg-row">
        <div class="fg"><label>전화번호</label><input type="text" id="fPhone" placeholder="예) 0507-1359-9879"></div>
        <div class="fg"><label>업종</label>
          <select id="fIndustry">
            <option value="pilates">🧘 필라테스/요가</option>
            <option value="cafe">☕ 카페/음식점</option>
            <option value="beauty">💄 미용/뷰티</option>
            <option value="medical">🏥 한의원/의원</option>
            <option value="academy">📚 학원/교육</option>
            <option value="general">🏪 일반 소매업</option>
          </select>
        </div>
      </div>
      <div class="fg"><label>주소</label><input type="text" id="fAddress" placeholder="예) 경기 고양시 일산동구 위시티로 55, 2층 103호"></div>
      <div class="fg-row">
        <div class="fg"><label>홈페이지 URL</label><input type="text" id="fUrl" placeholder="예) soyae.pages.dev"></div>
        <div class="fg"><label>네이버 Place ID</label><input type="text" id="fPlaceId" placeholder="예) 1432185533" style="font-family:monospace;font-size:12px"></div>
      </div>
      <div class="fg-row">
        <div class="fg"><label>네이버 블로그</label><input type="text" id="fBlog" placeholder="blog.naver.com/..."></div>
        <div class="fg"><label>인스타그램</label><input type="text" id="fInsta" placeholder="instagram.com/..."></div>
      </div>

      <div class="form-section">계약 정보</div>
      <div class="fg-row">
        <div class="fg"><label>계약 상태</label>
          <select id="fStatus">
            <option value="active">계약중</option>
            <option value="expiring">만료임박</option>
            <option value="expired">만료</option>
            <option value="pending">대기</option>
          </select>
        </div>
        <div class="fg"><label>계약 만료일</label><input type="date" id="fExpiry"></div>
      </div>
      <div class="fg"><label>메모</label><textarea id="fNote" placeholder="특이사항, 요청사항 등"></textarea></div>

      <div class="form-section">Supabase 이미지 설정 (선택)</div>
      <div class="fg-row">
        <div class="fg"><label>Supabase Cloud Name / URL</label><input type="text" id="fCloudName" placeholder="https://xxx.supabase.co" style="font-family:monospace;font-size:11px"></div>
        <div class="fg"><label>Supabase Key / Upload Preset</label><input type="text" id="fUploadPreset" placeholder="sb_publishable_..." style="font-family:monospace;font-size:11px"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeClientModal()">취소</button>
      <button class="btn btn-primary" onclick="saveClient()">저장</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="js/core.js"></script>
<script src="js/clients.js"></script>
<script>
  checkAuth();
  renderDashboard();
  renderClients();
</script>
</body>
</html>
