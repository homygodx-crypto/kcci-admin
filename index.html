<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KCCI Master Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<style>
body { display: flex; align-items: center; justify-content: center; }
.login-wrap {
  width: 360px;
  padding: 48px 40px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
}
.login-logo {
  text-align: center;
  margin-bottom: 36px;
}
.login-logo-icon {
  font-size: 36px;
  display: block;
  margin-bottom: 12px;
}
.login-logo-name {
  font-size: 18px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: .04em;
  display: block;
}
.login-logo-sub {
  font-size: 12px;
  color: var(--text3);
  letter-spacing: .1em;
  margin-top: 4px;
  display: block;
}
.login-btn {
  width: 100%;
  padding: 12px;
  background: var(--gold);
  color: #000;
  font-size: 14px;
  font-weight: 700;
  font-family: inherit;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  margin-top: 8px;
  transition: background .15s;
}
.login-btn:hover { background: var(--gold2); }
.login-err {
  display: none;
  font-size: 12px;
  color: var(--red);
  text-align: center;
  margin-top: 10px;
}
.login-note {
  font-size: 11px;
  color: var(--text3);
  text-align: center;
  margin-top: 20px;
}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <span class="login-logo-icon">🏢</span>
    <span class="login-logo-name">KCCI Master</span>
    <span class="login-logo-sub">한국창업분석연구소 관리 시스템</span>
  </div>
  <div class="fg">
    <label>관리자 아이디</label>
    <input type="text" id="loginId" placeholder="아이디 입력" autocomplete="username">
  </div>
  <div class="fg">
    <label>비밀번호</label>
    <input type="password" id="loginPw" placeholder="비밀번호 입력" autocomplete="current-password">
  </div>
  <button class="login-btn" onclick="doLogin()">로그인</button>
  <div class="login-err" id="loginErr">아이디 또는 비밀번호가 올바르지 않습니다.</div>
  <div class="login-note">KCCI 운영팀 전용 페이지</div>
</div>
<div id="toast"></div>
<script src="js/core.js"></script>
<script>
  // 이미 로그인된 경우 대시보드로
  if (sessionStorage.getItem('kcci_auth') === 'ok') {
    location.href = 'dashboard.html';
  }
</script>
</body>
</html>
