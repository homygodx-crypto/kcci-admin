<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>설정 — KCCI Master</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sb-logo">
      <span class="sb-logo-name">KCCI Master</span>
      <span class="sb-logo-sub">운영 관리 시스템</span>
    </div>
    <nav class="sb-nav">
      <div class="sb-sec">메인</div>
      <a href="dashboard.html" class="sb-item"><span class="ic">📊</span><span>대시보드</span></a>
      <a href="reservations.html" class="sb-item"><span class="ic">📅</span><span>예약 관리</span></a>
      <div class="sb-sec">도구</div>
      <a href="sitegen.html" class="sb-item"><span class="ic">🚀</span><span>홈페이지 생성</span></a>
      <a href="settings.html" class="sb-item active"><span class="ic">⚙️</span><span>설정</span></a>
    </nav>
    <div class="sb-footer">
      <div class="sb-logout" onclick="logout()"><span>🚪</span><span>로그아웃</span></div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <span class="topbar-title">설정</span>
    </div>
    <div class="content" style="max-width:720px">

      <!-- Groq AI -->
      <div class="card" style="margin-bottom:16px;display:none">
        <div class="card-head"><h3>🤖 Groq AI 설정</h3></div>
        <div class="card-body">
          <div class="alert-bar" style="margin-bottom:16px">
            <span class="ic">🔑</span>
            <div>API 키는 이 브라우저에만 저장됩니다.<br>
            <a href="https://console.groq.com" target="_blank" style="color:var(--gold)">console.groq.com</a>에서 무료 가입 → API Keys → Create API Key</div>
          </div>
          <div class="fg">
            <label>Groq API Key</label>
            <div style="display:flex;gap:8px">
              <input type="password" id="settingApiKey" placeholder="gsk_..." style="font-family:monospace;font-size:12px;flex:1">
              <button class="btn btn-ghost" onclick="toggleKeyVis()" id="visBtn">보기</button>
            </div>
            <div id="apiKeyStatus" style="margin-top:6px;font-size:12px;color:var(--text3)">저장된 키 없음</div>
          </div>
          <div class="fg" style="margin-top:14px">
            <label>Cloudflare Worker URL</label>
            <input type="text" id="settingWorkerUrl" style="display:none" placeholder="https://kcci-proxy.본인계정.workers.dev" style="font-family:monospace;font-size:12px">
            <div class="hint">Cloudflare Worker 배포 후 URL 입력</div>
          </div>
          <div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap">
            <button class="btn btn-primary" onclick="saveSettings()">💾 저장</button>
            <button class="btn btn-ghost" onclick="testApiKey()">🧪 연결 테스트</button>
            <button class="btn btn-danger" onclick="clearApiKey()">키 삭제</button>
          </div>
        </div>
      </div>

      <!-- AI 생성 설정 -->
      <div class="card" style="margin-bottom:16px">
        <div class="card-head"><h3>🎛 AI 생성 옵션</h3></div>
        <div class="card-body">
          <div class="fg-row">
            <div class="fg">
              <label>문체 스타일</label>
              <select id="settingTone">
                <option value="professional">전문적·신뢰감</option>
                <option value="warm">따뜻하고 친근하게</option>
                <option value="premium">프리미엄·고급스럽게</option>
                <option value="energetic">활기차고 젊게</option>
              </select>
            </div>
            <div class="fg">
              <label>응답 언어</label>
              <select id="settingLang">
                <option value="ko">한국어</option>
                <option value="en">English</option>
              </select>
            </div>
          </div>
          <div class="fg">
            <label>추가 프롬프트 지시사항</label>
            <textarea id="settingExtra" placeholder="예) 지역명(일산동구)을 자연스럽게 포함해주세요."></textarea>
          </div>
          <button class="btn btn-primary" onclick="saveAiOptions()" style="margin-top:4px">저장</button>
        </div>
      </div>

    </div>
  </div>
</div>
<div id="toast"></div>
<script src="js/core.js"></script>
<script src="js/ai.js"></script>
<script>
checkAuth();

function loadSettingsPage() {
  const key = getApiKey();
  const url = getWorkerUrl();
  if (key) document.getElementById('settingApiKey').value = key;
  if (url) document.getElementById('settingWorkerUrl').value = url;

  const tone = localStorage.getItem('kcci_ai_tone') || 'professional';
  const lang = localStorage.getItem('kcci_ai_lang') || 'ko';
  const extra = localStorage.getItem('kcci_ai_extra') || '';
  document.getElementById('settingTone').value = tone;
  document.getElementById('settingLang').value = lang;
  document.getElementById('settingExtra').value = extra;

  // 상태 표시
  const statusEl = document.getElementById('apiKeyStatus');
  if (key) {
    const masked = key.substring(0,10) + '••••••••' + key.slice(-4);
    statusEl.innerHTML = `<span style="color:var(--green)">✅ 저장됨: ${masked}</span>`;
  }
}

function toggleKeyVis() {
  const el = document.getElementById('settingApiKey');
  const btn = document.getElementById('visBtn');
  if (el.type === 'password') { el.type = 'text'; btn.textContent = '숨기기'; }
  else { el.type = 'password'; btn.textContent = '보기'; }
}

function saveSettings() {
  const key = document.getElementById('settingApiKey').value.trim();
  const url = document.getElementById('settingWorkerUrl').value.trim();
  if (!key) { showToast('API 키를 입력하세요.', 'error'); return; }
  if (!url) { showToast('Worker URL을 입력하세요.', 'error'); return; }
  saveApiKey(key);
  saveWorkerUrl(url);
  const statusEl = document.getElementById('apiKeyStatus');
  const masked = key.substring(0,10) + '••••••••' + key.slice(-4);
  statusEl.innerHTML = `<span style="color:var(--green)">✅ 저장됨: ${masked}</span>`;
  showToast('✅ 설정 저장 완료', 'success');
}

function clearApiKey() {
  if (!confirm('API 키와 Worker URL을 삭제할까요?')) return;
  localStorage.removeItem('kcci_api_key');
  localStorage.removeItem('kcci_worker_url');
  document.getElementById('settingApiKey').value = '';
  document.getElementById('settingWorkerUrl').value = '';
  document.getElementById('apiKeyStatus').textContent = '저장된 키 없음';
  showToast('삭제되었습니다.');
}

function saveAiOptions() {
  localStorage.setItem('kcci_ai_tone', document.getElementById('settingTone').value);
  localStorage.setItem('kcci_ai_lang', document.getElementById('settingLang').value);
  localStorage.setItem('kcci_ai_extra', document.getElementById('settingExtra').value);
  showToast('✅ AI 설정 저장 완료', 'success');
}

loadSettingsPage();
</script>
</body>
</html>
